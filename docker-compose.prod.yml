version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - REDIS_URL=redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      - chroma
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  chroma:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/data
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]

  redis:
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_storage:/data

volumes:
  chroma_data:
  redis_storage:
