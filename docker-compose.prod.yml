version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis/redis-stack-server:latest
    command: redis-server --appendonly yes
    volumes:
      - redis_storage:/data

volumes:
  redis_storage:
